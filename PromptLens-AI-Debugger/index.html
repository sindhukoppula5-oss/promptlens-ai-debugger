<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptLens - AI Prompt Debugger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🚀 PromptLens</h1>
    <p class="subtitle">AI Prompt Quality Analyzer</p>

    <textarea
      id="promptInput"
      placeholder="Paste your prompt here..."></textarea>

    <button onclick="debugPrompt()">
      Debug My Prompt
    </button>

    <div id="results">
      <h2>Results</h2>
      <p>Enter a prompt and click Debug.</p>
    </div>

    <button onclick="copyPrompt()">
      Copy Improved Prompt
    </button>

    <footer>
      <p><strong>Sindhu Koppula</strong></p>
      <p>your-email@gmail.com</p>

      <a href="https://digitalheroesco.com" target="_blank">
        <button>
          Built for Digital Heroes
        </button>
      </a>
    </footer>

  </div>

  <script src="script.js"></script>

</body>
</html>
